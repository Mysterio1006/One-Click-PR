name: Android Build and Release

# 触发条件
on:
  push:
    branches: [ "main" ] # 当代码推送到 main 分支时自动打包
    tags:
      - 'v*'             # 当推送以 v 开头的版本标签时，自动发布 Release

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest # 使用 GitHub 免费服务器

    steps:
      # 1. 拉取最新的仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置 Java 开发环境 (你的项目指定了 Java 21)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # 3. 赋予 Gradle 脚本执行权限 (解决 Linux 环境权限问题)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. 编译打包 Release 版 APK (因为你在 Gradle 配置了 debug 签名，这步不会报错)
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # 5. 将 APK 上传到当前工作流产物中 (在 Actions 页面可直接下载)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk

      # 6. 如果触发的是打标签事件 (如 v1.0)，则自动创建 GitHub Release 发版并挂载 APK
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}